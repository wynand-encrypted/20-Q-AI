<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20Q AI PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const part1 = "AQ.Ab8RN6LEepDIXd5XObK5YV-"; 
        const part2 = "QHkjVoDig42mwwDW8LvNRT-yEig";
        const apiKey = part1 + part2; 

        const { useState } = React;

        const fetchGemini = async (history) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: history.map(msg => ({ role: msg.role, parts: [{ text: msg.text }] })),
                systemInstruction: {
                    parts: [{
                        text: "You are a 20 Questions AI. Be snarky but use simple English. Ask ONE yes/no question. If you are 95% sure, set isGuess to true and provide the object name."
                    }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: { snark: { type: "STRING" }, isGuess: { type: "BOOLEAN" }, text: { type: "STRING" } },
                        required: ["snark", "isGuess", "text"]
                    }
                }
            };
            
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await response.json();
            const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            return JSON.parse(responseText);
        };

        function App() {
            const [gameState, setGameState] = useState('START');
            const [qCount, setQCount] = useState(0);
            const [loading, setLoading] = useState(false);
            const [currentSnark, setCurrentSnark] = useState("");
            const [currentText, setCurrentText] = useState("");
            const [history, setHistory] = useState([]);

            const startGame = async () => {
                setLoading(true); setGameState('PLAYING'); setQCount(1);
                const initial = [{ role: 'user', text: "Start game." }];
                const res = await fetchGemini(initial);
                setHistory([...initial, { role: 'model', text: JSON.stringify(res) }]);
                setCurrentSnark(res.snark); setCurrentText(res.text);
                setLoading(false);
            };

            const handleAnswer = async (ans) => {
                setLoading(true);
                const updated = [...history, { role: 'user', text: ans }];
                const res = await fetchGemini(updated);
                setHistory([...updated, { role: 'model', text: JSON.stringify(res) }]);
                setCurrentSnark(res.snark); setCurrentText(res.text);
                if (res.isGuess) setGameState('GUESSING'); else setQCount(qCount + 1);
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 font-sans">
                    <div className="w-full max-w-md glass rounded-[2.5rem] p-8 space-y-8 text-center shadow-2xl">
                        {gameState === 'START' && (
                            <div className="space-y-6">
                                <div className="w-20 h-20 bg-cyan-500 rounded-3xl mx-auto flex items-center justify-center shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                                    <svg className="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                </div>
                                <h1 className="text-4xl font-black tracking-tighter">20Q <span className="text-cyan-400">ULTRA</span></h1>
                                <p className="text-zinc-500 font-medium">Think of an object. My neural link is now at 100% capacity.</p>
                                <button onClick={startGame} className="w-full bg-white text-black py-5 rounded-2xl font-bold text-xl active:scale-95 transition-transform">START NEURAL LINK</button>
                            </div>
                        )}

                        {gameState === 'PLAYING' && (
                            <div className="space-y-8 animate-in fade-in zoom-in duration-300">
                                <div className="flex justify-between items-center text-xs font-bold text-zinc-500 uppercase tracking-widest">
                                    <span>Question {qCount}/20</span>
                                    <span className="text-cyan-400">Paid Tier Active</span>
                                </div>
                                <div className="min-h-[120px] flex items-center justify-center">
                                    {loading ? <div className="w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div> : <h2 className="text-2xl font-bold leading-tight">{currentText}</h2>}
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {['Yes', 'No', 'Maybe', 'IDK'].map(b => (
                                        <button key={b} disabled={loading} onClick={() => handleAnswer(b)} className="py-4 glass rounded-2xl font-bold hover:bg-white hover:text-black transition-all disabled:opacity-30">{b}</button>
                                    ))}
                                </div>
                                {!loading && <p className="text-cyan-500 italic text-sm">"{currentSnark}"</p>}
                            </div>
                        )}

                        {gameState === 'GUESSING' && (
                            <div className="space-y-8">
                                <h2 className="text-zinc-500 italic">"{currentSnark}"</h2>
                                <h1 className="text-4xl font-black">IS IT A <span className="text-cyan-400">{currentText.toUpperCase()}</span>?</h1>
                                <div className="space-y-3">
                                    <button onClick={() => setGameState('WON')} className="w-full bg-cyan-500 text-black py-5 rounded-2xl font-bold text-xl">YES, YOU GOT IT!</button>
                                    <button onClick={() => setGameState('PLAYING')} className="w-full glass py-4 rounded-2xl font-bold text-zinc-400">NO, KEEP GOING</button>
                                </div>
                            </div>
                        )}

                        {(gameState === 'WON' || qCount > 20) && (
                            <div className="space-y-6">
                                <h1 className="text-6xl font-black">{gameState === 'WON' ? 'I WIN.' : 'YOU WIN.'}</h1>
                                <button onClick={() => window.location.reload()} className="w-full glass py-4 rounded-2xl font-bold">REBOOT SYSTEM</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
