<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20Q AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- USING YOUR PAID TIER KEY ---
        const part1 = "AQ.Ab8RN6LEepDIXd5XObK5YV-"; 
        const part2 = "QHkjVoDig42mwwDW8LvNRT-yEig";
        const apiKey = part1 + part2; 

        const { useState } = React;

        const Icons = {
            Cpu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            Zap: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            RotateCcw: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        };

        const fetchGemini = async (history) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: history.map(msg => ({ role: msg.role, parts: [{ text: msg.text }] })),
                systemInstruction: {
                    parts: [{
                        text: `You are a world-class 20 Questions expert.
                        Rules:
                        1. Ask ONE highly strategic Yes/No question to narrow down the object quickly.
                        2. Be arrogant and snarky in your 'snark' field (max 8 words).
                        3. If 'isGuess' is true, set 'text' to ONLY the object name (e.g. 'Laptop').
                        4. If 'isGuess' is false, set 'text' to your question.
                        5. ALWAYS respond in valid JSON.`
                    }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: { snark: { type: "STRING" }, isGuess: { type: "BOOLEAN" }, text: { type: "STRING" } },
                        required: ["snark", "isGuess", "text"]
                    }
                }
            };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        };

        function App() {
            const [gameState, setGameState] = useState('START');
            const [qCount, setQCount] = useState(0);
            const [loading, setLoading] = useState(false);
            const [currentSnark, setCurrentSnark] = useState("");
            const [currentText, setCurrentText] = useState("");
            const [history, setHistory] = useState([]);
            const [showTaunt, setShowTaunt] = useState(false);

            const startGame = async () => {
                setGameState('PLAYING'); setQCount(1); setLoading(true);
                const initial = [{ role: 'user', text: "I'm thinking of an object. Start." }];
                setHistory(initial);
                try {
                    const res = await fetchGemini(initial);
                    setHistory([...initial, { role: 'model', text: JSON.stringify(res) }]);
                    setCurrentSnark(res.snark); setCurrentText(res.text);
                } catch (e) { setGameState('ERROR'); }
                setLoading(false);
            };

            const handleAnswer = async (ans) => {
                setLoading(true);
                const updated = [...history, { role: 'user', text: ans }];
                setHistory(updated);
                try {
                    const res = await fetchGemini(updated);
                    setHistory([...updated, { role: 'model', text: JSON.stringify(res) }]);
                    setCurrentSnark(res.snark);
                    setCurrentText(res.text);
                    
                    if (res.isGuess) {
                        setGameState('GUESSING');
                    } else {
                        const nextCount = qCount + 1;
                        if (nextCount > 20) {
                            setGameState('LOST');
                        } else {
                            setQCount(nextCount);
                            if (nextCount % 4 === 0) {
                                setShowTaunt(true);
                                setTimeout(() => setShowTaunt(false), 3000);
                            }
                        }
                    }
                } catch (e) { setGameState('ERROR'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-black text-white font-sans flex items-center justify-center p-4">
                    <div className="w-full max-w-lg bg-zinc-950 border border-zinc-900 rounded-3xl flex flex-col min-h-[550px] relative shadow-2xl overflow-hidden">
                        {/* Header */}
                        <div className="px-6 py-4 border-b border-zinc-900 flex justify-between items-center bg-zinc-950">
                            <div className="flex items-center space-x-2">
                                <span className="text-amber-400"><Icons.Cpu /></span>
                                <span className="font-bold text-lg">20Q <span className="text-cyan-400">AI</span></span>
                            </div>
                            {gameState === 'PLAYING' && (
                                <div className="text-xs font-mono text-zinc-500 uppercase">Question: <span className="text-cyan-400">{qCount}</span>/20</div>
                            )}
                        </div>

                        {/* Main Body */}
                        <div className="flex-1 flex flex-col p-8 justify-center relative">
                            {gameState === 'START' && (
                                <div className="text-center space-y-8">
                                    <h1 className="text-4xl font-light">I will read your mind.</h1>
                                    <p className="text-zinc-500 max-w-xs mx-auto text-sm">Think of an object. I will guess it in 20 questions or less.</p>
                                    <button onClick={startGame} className="bg-white text-black px-10 py-4 rounded-full font-bold flex items-center space-x-2 mx-auto">
                                        <Icons.Zap /> <span>Start Game</span>
                                    </button>
                                </div>
                            )}

                            {gameState === 'PLAYING' && (
                                <div className="flex flex-col h-full justify-between">
                                    {showTaunt ? (
                                        <div className="flex-1 flex flex-col items-center justify-center space-y-6 animate-pulse">
                                            <div className="text-purple-500 scale-150"><Icons.Cpu /></div>
                                            <h2 className="text-3xl font-black text-center text-purple-400 italic">"{currentSnark}"</h2>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex-1 flex items-center justify-center">
                                                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 w-full min-h-[140px] flex items-center justify-center">
                                                    {loading ? <p className="text-cyan-400 animate-pulse text-xl">Analyzing...</p> : <h2 className="text-2xl font-semibold text-center leading-snug">{currentText}</h2>}
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mt-8">
                                                {['Yes', 'No', 'Sometimes', 'Unknown'].map(label => (
                                                    <button key={label} disabled={loading} onClick={() => handleAnswer(label)} className="py-5 rounded-2xl border border-zinc-800 bg-zinc-900/50 hover:border-cyan-500 font-bold active:scale-95 transition-all disabled:opacity-30">{label}</button>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {gameState === 'GUESSING' && (
                                <div className="text-center space-y-10">
                                    <p className="text-amber-400 italic">"{currentSnark}"</p>
                                    <h1 className="text-4xl font-black">Is it a <span className="text-cyan-400 underline decoration-2">{currentText.toUpperCase()}</span>?</h1>
                                    <div className="space-y-4">
                                        <button onClick={() => setGameState('WON')} className="w-full bg-cyan-500 text-black py-5 rounded-full font-bold text-xl shadow-lg">YES, YOU GOT IT!</button>
                                        <button onClick={() => { setGameState('PLAYING'); handleAnswer("Wrong. Continue."); }} className="w-full border border-zinc-700 py-4 rounded-full font-bold text-zinc-400">NO, WRONG</button>
                                    </div>
                                </div>
                            )}

                            {gameState === 'WON' && (
                                <div className="text-center space-y-8 animate-bounce">
                                    <h1 className="text-7xl font-black italic">I WIN.</h1>
                                    <button onClick={() => window.location.reload()} className="bg-zinc-800 px-8 py-3 rounded-full flex items-center space-x-2 mx-auto font-bold"><Icons.RotateCcw /> <span>Restart</span></button>
                                </div>
                            )}

                            {gameState === 'LOST' && (
                                <div className="text-center space-y-8">
                                    <h1 className="text-6xl font-black text-zinc-500">YOU WIN.</h1>
                                    <p className="text-zinc-600">My neural link failed to identify your object.</p>
                                    <button onClick={() => window.location.reload()} className="bg-white text-black px-8 py-3 rounded-full flex items-center space-x-2 mx-auto font-bold"><Icons.RotateCcw /> <span>Restart</span></button>
                                </div>
                            )}

                            {gameState === 'ERROR' && (
                                <div className="text-center space-y-4">
                                    <h2 className="text-red-500 font-bold">CRITICAL ERROR</h2>
                                    <button onClick={() => window.location.reload()} className="underline">Refresh Page</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
