<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20Q AI</title>
    
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- YOUR NEW FREE-TIER KEY ---
        const part1 = "AQ.Ab8RN6Lha3SB79wCjtLWN_G"; 
        const part2 = "4k1yS-4x6CkpeJzC_pZC1Zx1rMA";
        const apiKey = part1 + part2; 

        const { useState } = React;

        const Icons = {
            Cpu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            Zap: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            RotateCcw: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>,
            AlertTriangle: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const fetchGemini = async (history, category) => {
            // USING THE FREE TIER MODEL: gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const formattedHistory = history.map(msg => ({
                role: msg.role === 'user' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));

            // BARE METAL: Stripped of everything that causes 400 errors
            const payload = {
                contents: [
                    { 
                        role: 'user', 
                        parts: [{ text: `You are playing 20 Questions. The category is ${category}. You must respond ONLY with raw, valid JSON. No markdown formatting. Format exactly like this: {"snark": "witty arrogant comment", "isGuess": false, "text": "Is it electronic?"}. If you are ready to guess the object, set isGuess to true and put ONLY the name of the object in text field. ONLY ASK YES/NO QUESTIONS.` }] 
                    },
                    { 
                        role: 'model', 
                        parts: [{ text: `{"snark": "I am ready.", "isGuess": false, "text": "Understood."}` }] 
                    },
                    ...formattedHistory
                ]
            };

            let lastError = "";

            // AUTO-RETRY LOOP
            for (let attempt = 1; attempt <= 5; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const rawText = await response.text(); 
                    
                    let data;
                    try {
                        data = JSON.parse(rawText);
                    } catch (parseError) {
                        throw new Error(`Server Overloaded (Status ${response.status})`);
                    }
                    
                    if (response.ok) {
                        let aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                        
                        const jsonStart = aiText.indexOf("{");
                        const jsonEnd = aiText.lastIndexOf("}");
                        
                        if (jsonStart === -1 || jsonEnd === -1) throw new Error("AI Output Malformed");
                        
                        const json = JSON.parse(aiText.substring(jsonStart, jsonEnd + 1));
                        json.text = json.text.replace(/Is it a\s+/i, "").replace(/Is it an\s+/i, "").replace(/\?/g, "");
                        return json;
                    } else {
                        lastError = data.error?.message || `Server Error ${response.status}`;
                        
                        if (response.status >= 500 || response.status === 429) {
                            await sleep(2000 * attempt);
                            continue;
                        }
                        throw new Error(lastError);
                    }

                } catch (e) {
                    lastError = e.message;
                    if (lastError.includes("Server Overloaded") || lastError.includes("Failed to fetch") || lastError.includes("AI Output Malformed")) {
                        await sleep(2000 * attempt);
                        continue;
                    }
                    throw e; 
                }
            }
            throw new Error(lastError || "Google's servers are completely gridlocked right now.");
        };

        function App() {
            const [gameState, setGameState] = useState('START');
            const [category, setCategory] = useState("");
            const [qCount, setQCount] = useState(0);
            const [loading, setLoading] = useState(false);
            const [showTaunt, setShowTaunt] = useState(false);
            const [currentSnark, setCurrentSnark] = useState("");
            const [currentText, setCurrentText] = useState("");
            const [history, setHistory] = useState([]);
            
            const [softError, setSoftError] = useState("");
            const [pendingAction, setPendingAction] = useState(null);

            const selectCategory = (cat) => {
                setCategory(cat);
                setGameState('READY');
            };

            const triggerAPI = async (actionType, updatedHistory, fallbackText) => {
                setLoading(true); setSoftError("");
                try {
                    const res = await fetchGemini(updatedHistory, category);
                    setCurrentSnark(res.snark); setCurrentText(res.text);
                    setHistory([...updatedHistory, { role: 'model', text: JSON.stringify(res) }]);
                    
                    if (res.isGuess) {
                        setGameState('GUESSING');
                    } else {
                        if (actionType === 'START') {
                            setGameState('PLAYING'); setQCount(1);
                        } else {
                            const next = qCount + 1;
                            if (next > 20) setGameState('LOST');
                            else {
                                setQCount(next);
                                if (next % 4 === 0) { setShowTaunt(true); setTimeout(() => setShowTaunt(false), 3000); }
                            }
                        }
                    }
                } catch (e) { 
                    setSoftError(e.message);
                    setPendingAction(() => () => triggerAPI(actionType, updatedHistory, fallbackText));
                }
                setLoading(false);
            };

            const startGame = () => {
                const init = [{ role: 'user', text: `I have an object in mind. Ask your first question.` }];
                setHistory(init);
                triggerAPI('START', init, 'Start');
            };

            const handleAnswer = (ans) => {
                const updated = [...history, { role: 'user', text: ans }];
                triggerAPI('ANSWER', updated, ans);
            };

            return (
                <div className="min-h-screen bg-black text-white font-sans flex items-center justify-center p-4">
                    <div className="w-full max-w-lg bg-zinc-950 border border-zinc-900 rounded-3xl flex flex-col min-h-[580px] relative shadow-2xl overflow-hidden">
                        
                        {/* Header */}
                        <div className="px-6 py-4 border-b border-zinc-900 flex justify-between items-center bg-zinc-950">
                            <div className="flex items-center space-x-2">
                                <span className="text-amber-400"><Icons.Cpu /></span>
                                <span className="font-bold text-lg text-white">20Q <span className="text-cyan-400 font-black">AI</span></span>
                            </div>
                            {gameState === 'PLAYING' && !showTaunt && !softError && (
                                <div className="text-xs font-mono text-zinc-500 uppercase tracking-widest">
                                    Q: <span className="text-cyan-400 font-bold">{qCount}</span>/20 | <span className="text-zinc-400">{category}</span>
                                </div>
                            )}
                        </div>

                        {/* Main Content */}
                        <div className="flex-1 flex flex-col p-8 justify-center relative">
                            {gameState === 'START' && (
                                <div className="text-center space-y-8 animate-in fade-in duration-500 flex flex-col items-center">
                                    
                                    {/* --- GLOWING LOGO SECTION --- */}
                                    <div className="relative mb-6 mt-2">
                                        <div className="absolute inset-0 bg-cyan-500 blur-2xl opacity-10 rounded-full animate-pulse"></div>
                                        <div className="bg-zinc-900 border-2 border-cyan-500/20 p-8 rounded-[2rem] relative shadow-[0_0_40px_rgba(6,182,212,0.1)] transform rotate-12 hover:rotate-0 transition-all duration-500">
                                            <div className="text-cyan-400 scale-[2]"><Icons.Cpu /></div>
                                        </div>
                                    </div>
                                    <h1 className="text-4xl font-black text-white leading-tight uppercase tracking-tighter drop-shadow-lg">
                                        20Q <span className="text-cyan-400">AI</span>
                                    </h1>
                                    {/* -------------------------------- */}

                                    <div className="grid grid-cols-2 gap-4 w-full">
                                        {['Animal', 'Vegetable', 'Mineral', 'Other'].map(cat => (
                                            <button key={cat} onClick={() => selectCategory(cat)} className="py-4 rounded-2xl border border-zinc-800 bg-zinc-900/40 hover:border-amber-400 font-bold text-lg active:scale-95 transition-all uppercase tracking-widest">{cat}</button>
                                        ))}
                                    </div>
                                    <p className="text-zinc-600 text-[10px] mt-2 italic text-center uppercase tracking-widest">Mind Link Initialized</p>
                                </div>
                            )}

                            {gameState === 'READY' && (
                                <div className="text-center space-y-10 animate-in slide-in-from-bottom duration-300">
                                    {softError ? (
                                        <div className="space-y-6">
                                            <div className="text-amber-400 flex justify-center scale-150"><Icons.AlertTriangle /></div>
                                            <h2 className="text-sm font-mono text-red-400 break-words bg-red-950/30 p-4 rounded-xl border border-red-900/50">{softError}</h2>
                                            <button onClick={pendingAction} disabled={loading} className="bg-amber-500 text-black px-12 py-4 rounded-full font-bold w-full disabled:opacity-50">
                                                {loading ? "Reconnecting..." : "Retry Connection"}
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <h2 className="text-2xl text-zinc-400 italic">"Think of a <span className="text-white uppercase font-bold tracking-widest">{category}</span>..."</h2>
                                            <button onClick={startGame} disabled={loading} className="bg-white text-black px-12 py-4 rounded-full font-bold flex items-center space-x-2 mx-auto active:scale-95 transition-all disabled:opacity-50 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                                <Icons.Zap /> <span>{loading ? "Connecting..." : "Begin Mind Reading"}</span>
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}

                            {gameState === 'PLAYING' && (
                                <div className="flex flex-col h-full justify-between">
                                    {showTaunt ? (
                                        <div className="flex-1 flex flex-col items-center justify-center space-y-6 animate-pulse">
                                            <div className="text-purple-500 scale-150 mb-4"><Icons.Cpu /></div>
                                            <h2 className="text-3xl font-black text-center text-purple-400 italic px-4">"{currentSnark}"</h2>
                                        </div>
                                    ) : softError ? (
                                        <div className="flex-1 flex flex-col items-center justify-center space-y-6">
                                            <div className="text-amber-400 flex justify-center scale-125 mb-2"><Icons.AlertTriangle /></div>
                                            <h2 className="text-xs font-mono text-red-400 break-words bg-red-950/30 p-4 rounded-xl border border-red-900/50 w-full text-center">{softError}</h2>
                                            <button onClick={pendingAction} disabled={loading} className="bg-zinc-800 border border-zinc-700 text-white px-8 py-4 rounded-full font-bold w-full hover:bg-zinc-700 active:scale-95 transition-all disabled:opacity-20 uppercase tracking-widest">
                                                {loading ? "Reconnecting..." : "Try Sending Answer Again"}
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex-1 flex items-center justify-center">
                                                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 w-full min-h-[160px] flex items-center justify-center shadow-inner">
                                                    {loading ? <p className="text-cyan-400 animate-pulse text-2xl font-medium tracking-widest uppercase">Analyzing...</p> : <h2 className="text-3xl font-semibold text-center leading-tight tracking-tight">{currentText}?</h2>}
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mt-8">
                                                {['Yes', 'No', 'Sometimes', 'Unknown'].map(btn => (
                                                    <button key={btn} disabled={loading} onClick={() => handleAnswer(btn)} className="py-5 rounded-2xl border border-zinc-800 bg-zinc-900/40 hover:border-cyan-500 font-bold active:scale-95 transition-all disabled:opacity-20 uppercase tracking-tighter">{btn}</button>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {gameState === 'GUESSING' && (
                                <div className="text-center space-y-10">
                                    {softError ? (
                                        <div className="space-y-6">
                                            <div className="text-amber-400 flex justify-center scale-150"><Icons.AlertTriangle /></div>
                                            <h2 className="text-xs font-mono text-red-400 break-words bg-red-950/30 p-4 rounded-xl border border-red-900/50">{softError}</h2>
                                            <button onClick={pendingAction} disabled={loading} className="bg-zinc-800 text-white px-8 py-4 rounded-full font-bold w-full disabled:opacity-20 uppercase">
                                                {loading ? "Reconnecting..." : "Send Response Again"}
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <p className="text-amber-400 italic font-medium">"{currentSnark}"</p>
                                            <h1 className="text-4xl font-black leading-tight">Is it a <span className="text-cyan-400 underline decoration-cyan-500/30 underline-offset-8 uppercase tracking-tighter">{currentText}</span>?</h1>
                                            <div className="space-y-4 pt-4">
                                                <button onClick={() => setGameState('WON')} className="w-full bg-cyan-500 text-black py-5 rounded-full font-bold text-xl shadow-lg">YES, YOU GOT IT!</button>
                                                <button disabled={loading} onClick={() => handleAnswer("No, wrong. Continue.")} className="w-full border border-zinc-700 py-4 rounded-full font-bold text-zinc-500 uppercase tracking-tighter disabled:opacity-20">No, keep going</button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {gameState === 'WON' && (
                                <div className="text-center space-y-10 animate-in zoom-in duration-500">
                                    <h1 className="text-7xl font-black italic tracking-tighter text-white uppercase leading-none">I Win.</h1>
                                    <button onClick={() => window.location.reload()} className="bg-white text-black px-10 py-3 rounded-full font-bold flex items-center space-x-2 mx-auto"><Icons.RotateCcw /> <span>Restart System</span></button>
                                </div>
                            )}

                            {gameState === 'LOST' && (
                                <div className="text-center space-y-10">
                                    <h1 className="text-5xl font-black text-zinc-500 tracking-tight text-white uppercase">You Win.</h1>
                                    <button onClick={() => window.location.reload()} className="border border-zinc-700 text-zinc-300 px-10 py-3 rounded-full font-bold flex items-center space-x-2 mx-auto"><Icons.RotateCcw /> <span>Try Again</span></button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
